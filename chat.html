<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Chat with AI</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f0f0f0;
      padding: 20px;
    }

    #chat {
      width: 300px;
      height: 300px;
      margin: auto;
border: 1px solid #ccc;
      overflow-y: auto;
      padding: 10px;
      text-align: left;
    }

    input {
      padding: 10px;
      width: 200px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>Chat with AI</h1>

<div id="chat"></div>

<input id="message" type="text" placeholder="اكتب هنا">
<button onclick="sendMessage()">إرسال</button>

<script>
async function sendMessage() {
  const input = document.getElementById("message");
  const msg = input.value;
  const chat = document.getElementById("chat");

  if (!msg) return;

  // عرض رسالة المستخدم
  chat.innerHTML += "<p><b>أنت:</b> " + msg + "</p>";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
"Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    // عرض رد السيرفر
    chat.innerHTML += "<p><b>AI:</b> " + data.message + "</p>";

  } catch (err) {
    chat.innerHTML += "<p style='color:red'>خطأ ❌</p>";
  }

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
